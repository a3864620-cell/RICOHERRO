<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華芝商業機器 - 理光SC/SP/J維修全書</title>
    <style>
        :root {
            --bg-main: #0a0e1a;
            --bg-card: rgba(255,255,255,0.04);
            --border-color: rgba(255,255,255,0.1);
            --text-main: #e2e8f0;
            --accent: #6366f1;
            --cause: #f59e0b;
            --remedy: #10b981;
            --warn: #ef4444;
            --info: #06b6d4;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 50px;
        }
        .header {
            background: #111827;
            padding: 18px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 10px 16px;
        }
        .model-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .model-btn {
            flex: 1 1 30%;
            padding: 11px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: #94a3b8;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }
        .model-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 15px var(--accent);
        }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        input {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 17px;
            outline: none;
            font-weight: 700;
        }
        button.btn-search {
            padding: 0 22px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            color: #fff;
            font-weight: 800;
            cursor: pointer;
        }
        .result-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: none;
            margin-top: 10px;
        }
        .res-head {
            padding: 18px;
            background: rgba(99,102,241,0.15);
            border-bottom: 1px solid var(--border-color);
        }
        .code-title {
            font-size: 30px;
            font-weight: 900;
            color: var(--accent);
        }
        .model-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 800;
            margin-right: 4px;
            background: rgba(16,185,129,0.2);
            color: #6ee7b7;
            border: 1px solid rgba(16,185,129,0.4);
        }
        .model-badge.warn {
            background: rgba(245,158,11,0.2);
            color: #fcd34d;
            border-color: rgba(245,158,11,0.4);
        }
        .section {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border-color);
        }
        .sec-title {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: #64748b;
        }
        .cause-box {
            padding: 13px;
            background: rgba(245,158,11,0.08);
            border-left: 5px solid var(--cause);
            font-size: 15px;
            line-height: 1.6;
            border-radius: 4px;
        }
        .rem-item {
            padding: 11px;
            background: rgba(16,185,129,0.08);
            border-left: 5px solid var(--remedy);
            font-size: 15px;
            margin-bottom: 7px;
            border-radius: 4px;
            line-height: 1.55;
        }
        .rem-item.danger {
            background: rgba(239,68,68,0.12);
            border-left-color: var(--warn);
        }
        .sp-path-box {
            padding: 11px 13px;
            background: rgba(6,182,212,0.08);
            border-left: 5px solid var(--info);
            font-size: 14px;
            line-height: 1.7;
            border-radius: 4px;
            color: #a5f3fc;
            margin-bottom: 10px;
        }
        .counter-p {
            text-align: center;
            font-size: 12px;
            color: #475569;
            margin-top: 25px;
            border-top: 1px solid #1e293b;
            padding-top: 12px;
        }
        .candidate-list {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-top: 10px;
            display: none;
            overflow: hidden;
        }
        .candidate-head {
            padding: 13px 18px;
            background: rgba(99,102,241,0.1);
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            font-weight: 800;
            color: #94a3b8;
        }
        .candidate-item {
            padding: 13px 18px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .candidate-item:last-child { border-bottom: none; }
        .candidate-item:hover { background: rgba(99,102,241,0.12); }
        .candidate-code {
            font-weight: 900;
            color: var(--accent);
            font-size: 16px;
            white-space: nowrap;
        }
        .candidate-name {
            color: #cbd5e1;
            font-size: 14px;
            text-align: right;
            flex: 1;
        }
        .empty-hint {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 15px;
            margin-top: 10px;
            display: none;
            color: #fca5a5;
            font-weight: 700;
            text-align: center;
        }
        .model-info {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: 600;
        }
        /* 快捷區 */
        .quick-block { margin-bottom: 12px; display: none; }
        .quick-block.show { display: block; }
        .quick-label {
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .quick-label .clear-btn {
            margin-left: auto;
            font-size: 10px;
            color: #475569;
            cursor: pointer;
            text-transform: none;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.03);
        }
        .quick-label .clear-btn:hover { color: #ef4444; }
        .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .chip {
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.04);
            color: #cbd5e1;
        }
        .chip:hover { background: rgba(99,102,241,0.15); border-color: var(--accent); color: #fff; }
        .chip.pinned {
            background: rgba(245,158,11,0.1);
            border-color: rgba(245,158,11,0.4);
            color: #fcd34d;
        }
        /* 釘選按鈕 + 複製按鈕 */
        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.04);
            color: #94a3b8;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .action-btn:hover { background: rgba(99,102,241,0.15); color: #fff; }
        .action-btn.pinned {
            background: rgba(245,158,11,0.15);
            border-color: rgba(245,158,11,0.5);
            color: #fcd34d;
        }
        .action-btn.copy-ok {
            background: rgba(16,185,129,0.15);
            border-color: rgba(16,185,129,0.5);
            color: #6ee7b7;
        }
        /* 分類瀏覽 */
        .browse-toggle {
            display: block;
            text-align: center;
            padding: 9px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            color: #94a3b8;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .browse-toggle:hover { background: rgba(99,102,241,0.1); color: #fff; }
        .category-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 14px;
        }
        .category-grid.show { display: grid; }
        .cat-btn {
            padding: 12px 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.04);
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            line-height: 1.4;
        }
        .cat-btn:hover { background: rgba(99,102,241,0.15); border-color: var(--accent); }
        .cat-btn .cat-icon { font-size: 22px; display: block; margin-bottom: 4px; }
        .cat-btn .cat-count { font-size: 11px; color: #64748b; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1 style="margin:0;font-size:22px;">理光維修全書</h1>
            <p style="color:#6366f1;margin:5px 0 0;font-size:13px;font-weight:700;">華芝商業機器</p>
        </div>
    </div>
    <div class="container">
        <div class="model-grid">
            <button class="model-btn" onclick="selM('MPC5503', this)">MPC5503</button>
            <button class="model-btn" onclick="selM('MPC3504', this)">MPC3504</button>
            <button class="model-btn" onclick="selM('IMC3500', this)">IMC3500</button>
            <button class="model-btn" onclick="selM('MP3555', this)">MP3555</button>
            <button class="model-btn" onclick="selM('MPC5502', this)">MPC5502</button>
        </div>
        <div class="model-info" id="modelInfo">請先選機型</div>
        <div class="search-box">
            <input type="text" id="q" placeholder="輸入代碼 (681 / 549 / SP5810 / J091)" onkeypress="if(event.key==='Enter') search()">
            <button class="btn-search" onclick="search()">查詢</button>
        </div>

        <!-- 分類瀏覽切換 -->
        <button class="browse-toggle" onclick="toggleBrowse()">📂 不知道代碼?點此按系統分類找</button>
        <div id="categoryGrid" class="category-grid"></div>

        <!-- 釘選 -->
        <div id="pinnedBlock" class="quick-block">
            <div class="quick-label">📌 常用代碼<span class="clear-btn" onclick="clearPinned()">清空</span></div>
            <div id="pinnedChips" class="quick-chips"></div>
        </div>
        <!-- 最近 -->
        <div id="recentBlock" class="quick-block">
            <div class="quick-label">🕐 最近查詢<span class="clear-btn" onclick="clearRecent()">清空</span></div>
            <div id="recentChips" class="quick-chips"></div>
        </div>

        <div id="candList" class="candidate-list">
            <div class="candidate-head" id="candHead"></div>
            <div id="candBody"></div>
        </div>

        <div id="emptyHint" class="empty-hint"></div>

        <div id="res" class="result-card">
            <div class="res-head">
                <div id="modelTags" style="margin-bottom:8px;"></div>
                <span class="code-title" id="rCode"></span>
                <p id="rName" style="margin:5px 0 0; font-weight:700;"></p>
                <div class="action-row">
                    <button id="pinBtn" class="action-btn" onclick="togglePin()">📌 加到常用</button>
                    <button class="action-btn" onclick="copyCode()">📋 複製代碼</button>
                    <button class="action-btn" onclick="copyAll()">📋 複製全部</button>
                    <button class="action-btn" onclick="copyClient()">📋 給客戶版</button>
                </div>
            </div>
            <div class="section"><div class="sec-title" style="color:var(--cause)">⚠️ 故障描述 / 原因</div><div class="cause-box" id="rCause"></div></div>
            <div id="spPathSection" class="section" style="display:none;"><div class="sec-title" style="color:var(--info)">🔑 進入 SP 模式步驟</div><div class="sp-path-box" id="rSpPath"></div></div>
            <div class="section"><div class="sec-title" style="color:var(--remedy)">🔧 維修指引 / 指令</div><div id="rRem"></div></div>
        </div>
        <div class="counter-p" id="count">正在載入...</div>
    </div>

    <script>
        const ALL = ["MPC5503","MPC3504","IMC3500","MP3555","MPC5502"];
        const COLOR_ONLY = ["MPC5503","MPC3504","IMC3500","MPC5502"];
        const NEW_GEN = ["MPC3504","IMC3500"];

        // SP 進入路徑(各機型)
        const SP_PATH = {
            "MPC5503": "Reset 鍵 → 1 → 0 → 7 → 長按 Reset 5 秒 → 進入 SP 選單",
            "MPC3504": "Reset 鍵 → 1 → 0 → 7 → 長按 Reset 5 秒 → 進入 SP 選單",
            "MPC5502": "Reset 鍵 → 1 → 0 → 7 → 長按 Reset 5 秒 → 進入 SP 選單",
            "IMC3500": "螢幕左下角圖示 → 數字鍵盤 → 輸入 1 0 7 → 長按 Stop 5 秒",
            "MP3555":  "Reset 鍵 → 1 → 0 → 7 → 長按 Reset 5 秒 → 進入 SP 選單"
        };

        window.db = {
            // ==================== 1xx 掃描系統 ====================
            "SC101-00": { models: ALL, name: "曝光燈白電平不足", cat:"scan", cause: "掃描白板時白電平峰值未達標準。可能掃描單元凝露、曝光燈衰退、白基準板髒污或位置偏移、SBU/BICU 故障。", rem: ["關機重開,確認是否再現","清潔曝光玻璃與白基準板","清潔 ADF 白滾輪 (SPDF)","檢查 SBU 至 BICU 的 FFC 排線","更換掃描座 (Scanner Carriage)","更換 BICU"] },
            "SC101-01": { models: ALL, name: "LED 曝光燈異常 (光量調整錯誤)", cat:"scan", cause: "LED 照度自動調整失敗。常見於 IMC3500/MPC3504 LED 光源機。", rem: ["檢查掃描座 FFC 排線","確認白基準膠片(玻璃背面)無變形","更換掃描座","更換 BICU"] },
            "SC102-00": { models: ALL, name: "LED 照度調整錯誤", cat:"scan", cause: "經多次自動調整後白電平仍未達標。", rem: ["重接 SBU 與 LEDB 排線","檢查白基準膠片是否髒污","更換掃描座"] },
            "SC120-00": { models: ALL, name: "掃描座原點異常", cat:"scan", cause: "掃描馬達啟動後 HP 感應器無變化訊號。鋼索斷、馬達卡死或感應器壞。", rem: ["檢查掃描鋼索是否脫落","清潔 HP 感應器","檢查掃描座軌道異物","更換掃描馬達"] },
            "SC121-00": { models: ALL, name: "掃描座原點異常 2", cat:"scan", cause: "歸位過程中超時。", rem: ["同 SC120 排查","檢查掃描座編碼器"] },
            "SC141-00": { models: ALL, name: "黑電平調整錯誤", cat:"scan", cause: "AGC 黑電平校準失敗。", rem: ["檢查 SBU","重接 BICU 排線","更換 SBU"] },
            "SC142-00": { models: ALL, name: "白電平調整錯誤", cat:"scan", cause: "白電平 AGC 校準超出範圍。", rem: ["清潔白基準板","檢查曝光燈","更換 SBU"] },
            "SC144-00": { models: ALL, name: "SBU 通訊錯誤", cat:"scan", cause: "SBU 板與 BICU 通訊中斷。", rem: ["重插 SBU 至 BICU 的 FFC","更換 SBU","更換 BICU"] },
            "SC161-00": { models: ALL, name: "IPU 通訊錯誤", cat:"scan", cause: "影像處理單元異常。", rem: ["關機重開","更新韌體","更換 BICU"] },
            "SC161-20": { models: ALL, name: "IPU DRAM 初始化失敗", cat:"scan", cause: "影像處理 DRAM 啟動失敗。", rem: ["更換 BICU"] },
            "SC185-00": { models: ALL, name: "ADF/SPDF CIS 通訊錯誤", cat:"scan", cause: "送稿機 CIS 模組與主機連線失敗。", rem: ["檢查 ADF 至主機的粗排線","更換 ADF CIS 單元","檢查 ADF PCB"] },
            "SC195-00": { models: ALL, name: "機器序號錯誤", cat:"scan", cause: "BICU 讀取的序號異常。", rem: ["執行 SP5-811 重新寫入序號"] },

            // ==================== 2xx 雷射系統 ====================
            "SC202-00": { models: ALL, name: "多角鏡馬達轉速異常", cat:"laser", cause: "LSU 內部多面鏡馬達無法達到/維持指定轉速。", rem: ["關機重開","檢查 LSU 至 IOB 排線","更換雷射單元 (LSU)"] },
            "SC202-01": { models: ALL, name: "多角鏡馬達啟動失敗", cat:"laser", cause: "多面鏡馬達無法啟動。", rem: ["更換 LSU","檢查 PSU 24V 供電"] },
            "SC220-01": { models: COLOR_ONLY, name: "雷射同步錯誤 (K-黑)", cat:"laser", cause: "黑色 LD 同步偵測訊號異常。", rem: ["清潔 LSU 防塵玻璃","檢查 LD 排線","更換 LSU"] },
            "SC220-02": { models: COLOR_ONLY, name: "雷射同步錯誤 (C-青)", cat:"laser", cause: "C 色 LD 同步異常。", rem: ["更換 LSU"] },
            "SC220-03": { models: COLOR_ONLY, name: "雷射同步錯誤 (M-洋紅)", cat:"laser", cause: "M 色 LD 同步異常。", rem: ["更換 LSU"] },
            "SC220-04": { models: COLOR_ONLY, name: "雷射同步錯誤 (Y-黃)", cat:"laser", cause: "Y 色 LD 同步異常。", rem: ["更換 LSU"] },
            "SC230-01": { models: ALL, name: "LD 主控異常", cat:"laser", cause: "雷射控制 IC 偵測異常。", rem: ["更換 LSU"] },
            "SC240-00": { models: ALL, name: "LD 高溫保護", cat:"laser", cause: "LSU 過熱保護觸發。", rem: ["檢查 LSU 散熱風扇","降低機內溫度"] },
            "SC272-00": { models: ALL, name: "LD 驅動 IC 異常", cat:"laser", cause: "LD 驅動電路異常。", rem: ["更換 LSU"] },

            // ==================== 3xx 鼓/顯影/充電 ====================
            // 注意:KCMY 順序為 -01=K, -02=C, -03=M, -04=Y(原廠手冊規格)
            "SC300-00": { models: ALL, name: "充電輥漏電 (K)", cat:"drum", cause: "K 充電輥偵測到漏電。PCU 損毀或高壓板異常。", rem: ["清潔 K 充電輥","檢查 K-PCU 接點","更換 K-PCU/PCDU","更換高壓供電板 (HVPS)"] },
            "SC302-00": { models: COLOR_ONLY, name: "充電輥漏電 (彩色)", cat:"drum", cause: "CMY 任一色充電輥漏電。", rem: ["逐一更換 CMY PCU 確認","更換彩色 HVPS"] },
            "SC312-01": { models: ALL, name: "充電偏壓錯誤 (K)", cat:"drum", cause: "高壓板無法輸出正確充電偏壓給 K。", rem: ["檢查 K 鼓接點是否髒污氧化","清潔 PCU 與機內接點","更換 HVPS"] },
            "SC312-05": { models: COLOR_ONLY, name: "充電偏壓錯誤 (彩色)", cat:"drum", cause: "CMY 充電偏壓異常。", rem: ["更換對應 PCU","更換彩色 HVPS"] },
            "SC324-01": { models: ALL, name: "顯影馬達鎖定 (K)", cat:"drum", cause: "K 顯影槽負荷過大或馬達燒毀。", rem: ["手轉 K 顯影確認是否卡死","清出顯影槽異物","更換 K 顯影馬達","更換 K 顯影單元"] },
            "SC324-05": { models: COLOR_ONLY, name: "顯影馬達鎖定 (彩色)", cat:"drum", cause: "CMY 共用顯影馬達異常。", rem: ["手轉彩色顯影確認","更換彩色顯影馬達"] },

        let curM = "";

        // ============= localStorage 快捷區 =============
        const LS_PIN = 'ricoh_pinned_v1';
        const LS_RECENT = 'ricoh_recent_v1';
        const MAX_PIN = 10;
        const MAX_RECENT = 8;

        function lsGet(key) { try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) { return {}; } }
        function lsSet(key, obj) { try { localStorage.setItem(key, JSON.stringify(obj)); } catch(e) {} }
        function getPinned(m) { return (lsGet(LS_PIN))[m] || []; }
        function setPinned(m, arr) { let a = lsGet(LS_PIN); a[m] = arr; lsSet(LS_PIN, a); }
        function getRecent(m) { return (lsGet(LS_RECENT))[m] || []; }
        function setRecent(m, arr) { let a = lsGet(LS_RECENT); a[m] = arr; lsSet(LS_RECENT, a); }
        function isPinned(m, k) { return getPinned(m).indexOf(k) !== -1; }
        function pushRecent(m, k) {
            let arr = getRecent(m).filter(x => x !== k);
            arr.unshift(k);
            if (arr.length > MAX_RECENT) arr = arr.slice(0, MAX_RECENT);
            setRecent(m, arr);
        }

        function togglePin() {
            if (!curM || !curKey) return;
            let pins = getPinned(curM);
            if (pins.indexOf(curKey) !== -1) {
                pins = pins.filter(x => x !== curKey);
                setPinned(curM, pins);
            } else {
                if (pins.length >= MAX_PIN) { alert(`常用代碼已達上限 ${MAX_PIN} 筆`); return; }
                pins.unshift(curKey);
                setPinned(curM, pins);
            }
            renderQuick();
            updatePinBtn();
        }

        function updatePinBtn() {
            let btn = document.getElementById('pinBtn');
            if (!curKey) { btn.style.display = 'none'; return; }
            btn.style.display = 'inline-flex';
            if (isPinned(curM, curKey)) {
                btn.classList.add('pinned');
                btn.innerHTML = '📌 已釘選';
            } else {
                btn.classList.remove('pinned');
                btn.innerHTML = '📌 加到常用';
            }
        }

        function clearPinned() {
            if (!curM || !confirm(`清空 ${curM} 的常用代碼?`)) return;
            setPinned(curM, []);
            renderQuick();
            updatePinBtn();
        }

        function clearRecent() {
            if (!curM || !confirm(`清空 ${curM} 的最近查詢?`)) return;
            setRecent(curM, []);
            renderQuick();
        }

        function renderQuick() {
            if (!curM) {
                document.getElementById('pinnedBlock').classList.remove('show');
                document.getElementById('recentBlock').classList.remove('show');
                return;
            }
            let pins = getPinned(curM);
            let recents = getRecent(curM);
            let pinBlock = document.getElementById('pinnedBlock');
            if (pins.length > 0) {
                pinBlock.classList.add('show');
                document.getElementById('pinnedChips').innerHTML = pins.map(k => `<span class="chip pinned" onclick="quickPick('${k}')">📌 ${k}</span>`).join('');
            } else { pinBlock.classList.remove('show'); }
            let recF = recents.filter(k => pins.indexOf(k) === -1);
            let recBlock = document.getElementById('recentBlock');
            if (recF.length > 0) {
                recBlock.classList.add('show');
                document.getElementById('recentChips').innerHTML = recF.map(k => `<span class="chip" onclick="quickPick('${k}')">${k}</span>`).join('');
            } else { recBlock.classList.remove('show'); }
        }

        function quickPick(key) { if (window.db[key]) showResult(key); }

        // ============= 複製功能 =============
        function copyToClip(text, btnSelector) {
            try {
                navigator.clipboard.writeText(text).then(() => {
                    flashCopy(btnSelector, '✓ 已複製');
                });
            } catch(e) {
                // 退回方案:textarea
                let ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                flashCopy(btnSelector, '✓ 已複製');
            }
        }
        function flashCopy(selector, msg) {
            let btn = document.querySelector(selector);
            if (!btn) return;
            let orig = btn.innerHTML;
            btn.innerHTML = msg;
            btn.classList.add('copy-ok');
            setTimeout(() => {
                btn.innerHTML = orig;
                btn.classList.remove('copy-ok');
            }, 1500);
        }
        function copyCode() {
            if (!curKey) return;
            copyToClip(curKey, '.action-row .action-btn:nth-child(2)');
        }
        function copyAll() {
            if (!curKey || !window.db[curKey]) return;
            let d = window.db[curKey];
            let text = `【${curKey}】${d.name}\n\n` +
                       `▍故障原因:\n${d.cause}\n\n` +
                       `▍維修步驟:\n` +
                       d.rem.map((x,i) => `${i+1}. ${x}`).join('\n') +

            copyToClip(text, '.action-row .action-btn:nth-child(3)');
        }

        function renderCategories() {
            let counts = {};
            for (let c in CATEGORIES) counts[c] = 0;
            Object.keys(window.db).forEach(k => {
                let d = window.db[k];
                if (!d.models.includes(curM)) return;
                if (counts[d.cat] !== undefined) counts[d.cat]++;
            });
            let html = '';
            for (let c in CATEGORIES) {
                if (counts[c] === 0) continue;
                let info = CATEGORIES[c];
                html += `<button class="cat-btn" onclick="showCategory('${c}')">
                    <span class="cat-icon">${info.icon}</span>
                    ${info.name}
                    <span class="cat-count">${counts[c]} 筆</span>
                </button>`;
            }
            document.getElementById('categoryGrid').innerHTML = html;
        }
        function showCategory(cat) {
            let keys = Object.keys(window.db).filter(k => {
                let d = window.db[k];
                return d.cat === cat && d.models.includes(curM);
            });
            if (keys.length === 0) return;
            showCandidates(keys, `${CATEGORIES[cat].icon} ${CATEGORIES[cat].name}`);

            let info = document.getElementById('modelInfo');

        function normalize(s) { return s.trim().toUpperCase().replace(/\s+/g, ''); }
        function digitsOnly(s) { return s.replace(/[^0-9]/g, ''); }
        function getMainNum(key) { let m = key.match(/^(?:SC|SP|J)(\d+)/i); return m ? m[1] : ''; }
        function filterByModel(keys) { return curM ? keys.filter(k => window.db[k].models.includes(curM)) : keys; }

        function search() {
            let raw = document.getElementById('q').value;
            let input = normalize(raw);
            if (!curM) { alert("請先選擇機型"); return; }
            if (!input) { alert("請輸入代碼"); return; }
            let allKeys = Object.keys(window.db);
            let keys = filterByModel(allKeys);

            if (window.db[input] && window.db[input].models.includes(curM)) { showResult(input); return; }
            if (window.db[input] && !window.db[input].models.includes(curM)) { showWrongModel(input); return; }

            for (let p of ['SC', 'SP', 'J']) {
                let key = p + input;
                if (window.db[key] && window.db[key].models.includes(curM)) { showResult(key); return; }
            }

            let inDigits = digitsOnly(input);
            if (inDigits && /^\d+$/.test(input)) {
                let mainMatches = keys.filter(k => getMainNum(k) === inDigits);
                if (mainMatches.length === 1) { showResult(mainMatches[0]); return; }
                if (mainMatches.length > 1) { showCandidates(mainMatches, `代碼 ${inDigits} 有多個子項,請選擇:`); return; }
            }
            let startMatches = keys.filter(k => k.startsWith(input));
            if (startMatches.length === 1) { showResult(startMatches[0]); return; }
            if (startMatches.length > 1) { showCandidates(startMatches, `「${input}」開頭的代碼,請選擇:`); return; }
            if (inDigits && /^\d+$/.test(input)) {
                let prefix = keys.filter(k => getMainNum(k).startsWith(inDigits));
                if (prefix.length > 0 && prefix.length <= 25) { showCandidates(prefix, `數字「${inDigits}」開頭的代碼,請選擇:`); return; }
            }
            showEmpty(input, keys);
        }

        function showResult(key) {
            hideAll();
            let data = window.db[key];
            curKey = key;
            if (curM) pushRecent(curM, key);
            let res = document.getElementById('res');
            res.style.display = 'block';
            let tagsHtml = data.models.map(m => {
                let cls = (m === curM) ? 'model-badge' : 'model-badge warn';
                return `<span class="${cls}">${m}</span>`;
            }).join('');
            document.getElementById('modelTags').innerHTML = tagsHtml;
            document.getElementById('rCode').innerText = key;
            document.getElementById('rName').innerText = data.name;
            document.getElementById('rCause').innerText = data.cause;

            // SP 進入路徑(只對 SP 指令顯示)
            let spSection = document.getElementById('spPathSection');
            if (data.isSp && curM && SP_PATH[curM]) {
                spSection.style.display = 'block';
                document.getElementById('rSpPath').innerHTML = `<b style="color:#fff;">${curM} 進入方式:</b><br>${SP_PATH[curM]}<br><br><span style="color:#94a3b8;font-size:13px;">★進入後輸入指令編號 → 選擇參數 → 按 # 執行 → 重開機</span>`;
            } else {
                spSection.style.display = 'none';
            }

            document.getElementById('rRem').innerHTML = data.rem.map((x, i) => {
                let isDanger = x.includes('★') || x.includes('注意') || x.includes('高溫') || x.includes('大忌') || x.includes('關鍵');
                let cls = isDanger ? 'rem-item danger' : 'rem-item';
                return `<div class="${cls}"><b>${i + 1}.</b> ${x}</div>`;
            }).join('');
            updatePinBtn();
            renderQuick();
            window.scrollTo({ top: res.offsetTop - 80, behavior: 'smooth' });
        }

        function showWrongModel(key) {
            hideAll();
            let data = window.db[key];
            let hint = document.getElementById('emptyHint');
            hint.innerHTML = `⚠️ 代碼「${key}」存在,但<b>不適用於 ${curM}</b><br><span style="font-weight:400;font-size:13px;color:#cbd5e1;margin-top:8px;display:block;">適用機型: ${data.models.join('、')}</span><span style="font-weight:400;font-size:12px;color:#94a3b8;margin-top:6px;display:block;cursor:pointer;text-decoration:underline;" onclick="forceShow('${key}')">仍要查看內容 →</span>`;
            hint.style.display = 'block';
        }

        function forceShow(key) {
            hideAll();
            let data = window.db[key];
            curKey = key;
            let res = document.getElementById('res');
            res.style.display = 'block';
            let tagsHtml = data.models.map(m => `<span class="model-badge">${m}</span>`).join('');
            document.getElementById('modelTags').innerHTML = `<span class="model-badge warn">⚠️ 不適用 ${curM}</span> ` + tagsHtml;
            document.getElementById('rCode').innerText = key;
            document.getElementById('rName').innerText = data.name;
            document.getElementById('rCause').innerText = data.cause;
            let spSection = document.getElementById('spPathSection');
            if (data.isSp && SP_PATH[curM]) {
                spSection.style.display = 'block';
                document.getElementById('rSpPath').innerHTML = `<b>${curM} 進入方式:</b><br>${SP_PATH[curM]}`;
            } else { spSection.style.display = 'none'; }
            document.getElementById('rRem').innerHTML = data.rem.map((x, i) => {
                let isDanger = x.includes('★') || x.includes('注意') || x.includes('高溫') || x.includes('大忌');
                return `<div class="${isDanger?'rem-item danger':'rem-item'}"><b>${i + 1}.</b> ${x}</div>`;
            }).join('');
            updatePinBtn();
            window.scrollTo({ top: res.offsetTop - 80, behavior: 'smooth' });
        }

        function showCandidates(keys, headText) {
            hideAll();
            keys.sort();
            document.getElementById('candHead').innerText = headText + ` (共 ${keys.length} 筆)`;
            document.getElementById('candBody').innerHTML = keys.map(k => `<div class="candidate-item" onclick="pickCand('${k}')"><span class="candidate-code">${k}</span><span class="candidate-name">${window.db[k].name}</span></div>`).join('');
            document.getElementById('candList').style.display = 'block';
            window.scrollTo({ top: document.getElementById('candList').offsetTop - 80, behavior: 'smooth' });
        }

        function pickCand(key) { if (window.db[key]) showResult(key); }

        function showEmpty(input, keys) {
            hideAll();
            let inDigits = digitsOnly(input);
            let suggestions = inDigits ? keys.filter(k => {
                let kn = getMainNum(k);
                return kn && kn.charAt(0) === inDigits.charAt(0);
            }).slice(0, 6) : [];
            let hint = document.getElementById('emptyHint');
            let html = `❌ ${curM} 找不到代碼「${input}」`;
            if (suggestions.length > 0) {
                html += `<div style="margin-top:12px;font-weight:400;color:#cbd5e1;font-size:13px;">你是不是要找:</div><div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;">`;
                html += suggestions.map(k => `<span onclick="pickCand('${k}')" style="cursor:pointer;padding:6px 12px;background:rgba(99,102,241,0.2);border:1px solid var(--accent);border-radius:6px;color:#e0e7ff;font-size:13px;">${k}</span>`).join('');
                html += `</div>`;
            }
            hint.innerHTML = html;
            hint.style.display = 'block';
        }

        function updateCount() {
            document.getElementById('count').innerText = "全資料庫: " + Object.keys(window.db).length + " 筆";
        }
        window.onload = function() { updateCount(); renderQuick(); };
    </script>
</body>
</html>
